name: Bug report
description: Report a reproducible CLI problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Remove secrets and private target details.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

name: SBOM and Provenance

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  sbom:
    name: SBOM and provenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
      - name: Generate SBOM
        run: |
          mkdir -p dist
          npm sbom --sbom-format cyclonedx --sbom-type application > dist/aegis-security-cli.cdx.json
          npm sbom --sbom-format spdx --sbom-type application > dist/aegis-security-cli.spdx.json
      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aegis-security-cli-sbom
          path: dist/*.json
          if-no-files-found: error
      # actions/attest-build-provenance v4.1.1
      - if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/aegis-security-cli.cdx.json

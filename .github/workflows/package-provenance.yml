name: Package Provenance

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  package:
    name: Pack and attest npm artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - name: Pack npm package
        id: pack
        run: |
          npm pack --json > pack.json
          node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync("pack.json","utf8"))[0].filename; fs.appendFileSync(process.env.GITHUB_OUTPUT, `package=${p}\n`);'
      # actions/upload-artifact v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.package }}
          if-no-files-found: error
      # actions/attest-build-provenance v4.1.1
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: ${{ steps.pack.outputs.package }}

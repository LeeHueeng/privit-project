name: Aegis Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aegis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
      - run: npm test
      - run: npm run catalog:generate
      - run: node ./bin/aegis.js init --environment local --force
      - run: node ./bin/aegis.js scope verify --mode passive
      - run: node ./bin/aegis.js plan --mode ci --target ci_cd
      - run: node ./bin/aegis.js run --mode ci --target ci_cd --dry-run
      - run: node ./bin/aegis.js report --format sarif

name: Aegis Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aegis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
      - run: npm test
      - run: npm run catalog:generate
      - run: node ./bin/aegis.js init --environment local --force
      - run: node ./bin/aegis.js scope verify --mode passive
      - run: node ./bin/aegis.js plan --mode ci --target ci_cd
      - run: node ./bin/aegis.js run --mode ci --target ci_cd --dry-run
      - run: node ./bin/aegis.js report --format sarif
